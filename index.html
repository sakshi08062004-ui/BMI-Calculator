<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>
<style> body{

margin:0;
padding:0;
background:#f2f6ff;
font-family:Arial;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.container{

background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
width:350px;

}

h1{

text-align:center;
color:#1976d2;

}

.input-group{

margin-bottom:15px;

}

label{

display:block;
margin-bottom:5px;

}

input,select{

width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
margin-top:10px;

background:#1976d2;
color:white;

border:none;
border-radius:8px;

cursor:pointer;

}

button:hover{

background:#0d47a1;

}

.reset{

background:#777;

}

#result{

margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;

}</style>
</head>

<body>

<div class="container">

<h1>BMI Calculator</h1>

<div class="input-group">
<label>Age</label>
<input type="number" id="age">
</div>

<div class="input-group">
<label>Gender</label>

<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

</div>

<div class="input-group">
<label>Height (cm)</label>
<input type="number" id="height">
</div>

<div class="input-group">
<label>Weight (kg)</label>
<input type="number" id="weight">
</div>

<button onclick="calculateBMI()">Calculate BMI</button>

<button class="reset" onclick="resetData()">Reset</button>

<div id="result"></div>

</div>

<script >

function calculateBMI(){

let age=document.getElementById("age").value;
let gender=document.getElementById("gender").value;
let height=document.getElementById("height").value/100;
let weight=document.getElementById("weight").value;

if(age==""||height==0||weight==""){

alert("Please fill all fields");let bmi=(weight/(height*height)).toFixed(2);

let category="";

if(bmi<16)
category="Severe Thinness";

else if(bmi<17)
category="Moderate Thinness";

else if(bmi<18.5)
category="Mild Thinness";

else if(bmi<25)
category="Normal";

else if(bmi<30)
category="Overweight";

else if(bmi<35)
category="Obese Class I";

else if(bmi<40)
category="Obese Class II";

else
category="Obese Class III";

document.getElementById("result").innerHTML=

`
Age : ${age}<br>
Gender : ${gender}<br>
BMI : ${bmi}<br>
Category : ${category}
`;

}

function resetData(){

document.getElementById("age").value="";
document.getElementById("height").value="";
document.getElementById("weight").value="";
document.getElementById("result").innerHTML="";

}
return;

}


</script>

</body>
</html>
