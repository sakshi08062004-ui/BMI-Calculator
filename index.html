<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card" aria-labelledby="calculator-heading">
        <h1 id="calculator-heading">Body Mass Index Calculator</h1>
        <p class="subtitle">
          Enter your age, gender, height and weight to calculate your BMI and
          see the wellness category.
        </p>

        <form id="bmi-form" novalidate>
          <div class="input-group">
            <label for="age">Age</label>
            <input id="age" name="age" type="number" min="1" max="120" required />
          </div>

          <div class="input-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="input-group">
            <label for="height">Height (cm)</label>
            <input id="height" name="height" type="number" min="50" max="250" required />
          </div>

          <div class="input-group">
            <label for="weight">Weight (kg)</label>
            <input id="weight" name="weight" type="number" min="20" max="300" required />
          </div>

          <div class="button-row">
            <button type="submit">Calculate BMI</button>
            <button class="reset" type="reset">Reset</button>
          </div>
        </form>

        <div id="result" class="result-card" aria-live="polite"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
